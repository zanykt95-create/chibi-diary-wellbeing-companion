steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/chibi-diary:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/chibi-diary:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'chibi-diary'
      - '--image=gcr.io/$PROJECT_ID/chibi-diary:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      # Demo-only: allows public access for Kaggle judges. Remove for production.
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--port=8080'
      - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=True,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1'
images:
  - 'gcr.io/$PROJECT_ID/chibi-diary:$COMMIT_SHA'
